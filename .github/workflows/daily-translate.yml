name: Daily Translate docs.world.org to Korean

on:
  schedule:
    - cron: '0 2 * * *' # Daily 11:00 KST (02:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (syntax)
        run: python -m py_compile scripts/translate_site.py

      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Translate site
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          SOURCE_BASE_URL: https://docs.world.org
          SOURCE_SITEMAP_URL: https://docs.world.org/sitemap.xml
          MAX_URLS: '500'
          OUTPUT_DIR: output
        run: python scripts/translate_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
