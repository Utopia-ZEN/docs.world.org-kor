name: Daily Translate docs.world.org to Korean

on:
  schedule:
    - cron: '0 2 * * *' # Daily 11:00 KST (02:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: docs-world-source-state

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (syntax)
        run: python -m py_compile scripts/translate_site.py

      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Translate site (or pass if no changes)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          SOURCE_BASE_URL: https://docs.world.org
          SOURCE_SITEMAP_URL: https://docs.world.org/sitemap.xml
          MAX_URLS: '30'
          OUTPUT_DIR: output
          STATE_PATH: .state/source-fingerprint.json
          OPENAI_MAX_RETRIES: '8'
          SLEEP_BETWEEN_REQUESTS: '1.0'
          SLEEP_BETWEEN_TRANSLATIONS: '0.6'
        run: python scripts/translate_site.py

      - name: Detect source change result
        id: detect
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path('output/summary.json').read_text(encoding='utf-8'))
          changed = 'false' if summary.get('skipped') else 'true'
          import os
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"changed={changed}\n")
          print(f"changed={changed}")
          PY

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: docs-world-source-state

      - name: Setup Pages
        if: steps.detect.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    if: needs.build.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
